# Production stack for a self-hosted, commercial Excalidraw.
#
#   1. cp .env.prod.example .env.prod   and fill in the values
#   2. docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Services:
#   - caddy            : TLS-terminating reverse proxy (auto HTTPS)
#   - excalidraw       : the static frontend (nginx), built from the root Dockerfile
#   - commerce-backend : auth + subscriptions + feature gating
#
# All public traffic goes through Caddy on 80/443. The frontend and backend are
# not exposed directly to the host.

services:
  caddy:
    image: caddy:2-alpine
    container_name: excalidraw-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # e.g. DOMAIN=app.example.com  (leave unset for local HTTP on :80)
      - DOMAIN=${DOMAIN:-:80}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - excalidraw
      - commerce-backend

  excalidraw:
    build:
      context: .
      args:
        - NODE_ENV=production
    container_name: excalidraw-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    expose:
      - "80"

  commerce-backend:
    build:
      context: ./commerce-backend
    container_name: excalidraw-commerce
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - TRUST_PROXY=true
    expose:
      - "3015"
    volumes:
      - commerce_data:/app/data

volumes:
  caddy_data:
  caddy_config:
  commerce_data:
